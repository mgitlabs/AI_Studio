name: Build Python to Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-22.04 # Buildozer-এর জন্য Ubuntu 22.04 বেশি স্ট্যাবল

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Buildozer এবং এর প্রয়োজনীয় ডিপেন্ডেন্সি ইনস্টল করা
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev liblzma-dev
        pip install --upgrade pip
        pip install buildozer cython

    # যদি আগে থেকে buildozer.spec ফাইল না থাকে, তবে একটি ডিফল্ট ফাইল তৈরি করবে
    - name: Initialize Buildozer (if not exists)
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init
          # এখানে অ্যাপের নাম ও প্যাকেজ কনফিগার করতে পারেন
          sed -i 's/#title = My Application/title = AI Studio/' buildozer.spec
          sed -i 's/#package.name = myapp/package.name = aistudio/' buildozer.spec
        fi

    # অ্যান্ড্রয়েড APK বিল্ড করা (প্রথমবার ১০-১৫ মিনিট সময় লাগতে পারে)
    - name: Build Android APK
      run: buildozer android debug

    # বিল্ড হওয়া APKটি গিটহাবে আপলোড করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AI-Studio-Python-APK
        path: .buildozer/android/platform/build-armeabi-v7a_arm64-v8a/dists/*/*.apk
