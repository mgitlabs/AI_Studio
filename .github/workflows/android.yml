name: Android CI/CD (Build APK)

# কোড প্রধান (main/master) ব্রাঞ্চে পুশ করলে বা পুল রিকোয়েস্ট দিলে এই ওয়ার্কফ্লো রান হবে
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ১. গিটহাব থেকে কোড চেকআউট করা
    - name: Checkout the code
      uses: actions/checkout@v4

    # ২. জাভা এনভায়রনমেন্ট সেটআপ করা (অ্যান্ড্রয়েডের জন্য Java 17 বর্তমানে স্ট্যান্ডার্ড)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # ৩. Gradle স্ক্রিপ্ট রান করার পারমিশন দেওয়া
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # ৪. অ্যান্ড্রয়েড ডিবাগ (Debug) APK বিল্ড করা
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # ৫. বিল্ড হওয়া APK ফাইলটি GitHub Artifacts-এ আপলোড করা (যাতে আপনি ডাউনলোড করতে পারেন)
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Todo-App-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
