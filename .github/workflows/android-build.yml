name: Android CI Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ১. রিপোজিটরি থেকে কোড চেকআউট করা
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. জাভা পরিবেশ সেটআপ করা
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ৩. গ্রেডল এনভায়রনমেন্ট সেটআপ
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ৪. রিলিজ বিল্ডের সময় সাইনিং এরর এড়াতে debug config ফোর্স করা
      - name: Build Release APK with Debug Signing
        run: gradle assembleRelease -Pandroid.packageBuildConfig=false -PsigningConfig=debug

      # ৫. বিল্ড হওয়া Release APK ফাইলটি আপলোড করা
      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/
