name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # এর মাধ্যমে আপনি চাইলে GitHub ড্যাশবোর্ড থেকে ম্যানুয়ালিও বিল্ড রান করতে পারবেন

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # এটি গ্রেডল ডিপেন্ডেন্সি ক্যাশে রাখবে যাতে পরের বার বিল্ড দ্রুত হয়

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        env:
          # গ্রেডল ডেমোনের জন্য পর্যাপ্ত মেমোরি সেট করা (OOM ক্র্যাশ রোধ করতে)
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3024m -XX:MaxMetaspaceSize=512m"
        run: |
          ./gradlew assembleRelease \
            -Pandroid.packageBuildConfig=false \
            -PsigningConfig=debug \
            --no-daemon \
            --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Release-APK
          path: app/build/outputs/apk/release/*.apk
