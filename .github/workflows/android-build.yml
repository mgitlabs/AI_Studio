name: Android CI Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ১. রিপোজিটরি থেকে কোড চেকআউট করা
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. জাভা পরিবেশ সেটআপ করা
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ৩. গ্রেডল এনভায়রনমেন্ট সেটআপ
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ৪. গ্রেডল যে ফাইলটি খুঁজছে (my-upload-key.jks), সেটি তৈরি করা
      - name: Generate Expected Keystore File
        run: |
          keytool -genkey -v -keystore my-upload-key.jks -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Release,O=Android,C=US"

      # ৫. রিলিজ APK বিল্ড করার কমান্ড
      - name: Build Release APK with Gradle
        run: gradle assembleRelease

      # ৬. বিল্ড হওয়া Release APK ফাইলটি আপলোড করা
      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/
