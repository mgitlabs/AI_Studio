name: Android CI Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ১. রিপোজিটরি থেকে কোড চেকআউট করা
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. জাভা পরিবেশ সেটআপ করা
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ৩. গ্রেডল নিজেই যেন রানার এনভায়রনমেন্টে বিল্ড করতে পারে তার ব্যবস্থা করা
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ৪. gradlew ফাইল ছাড়া সরাসরি gradle কমান্ড দিয়ে বিল্ড করা
      - name: Build with Gradle
        run: gradle assembleDebug

      # ৫. বিল্ড হওয়া APK ফাইলটি আপলোড করা
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
